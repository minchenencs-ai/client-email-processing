<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Email Ingestion Prototype</title>
    <style>
      body { font-family: system-ui, -apple-system, sans-serif; padding: 24px }
      textarea { width: 100%; height: 120px }
      button { margin-top: 8px }
      #result { margin-top: 12px; white-space: pre-wrap }
    </style>
  </head>
  <body>
    <h1>Email Ingestion Prototype</h1>
    <p>Paste email text and press <strong>Classify</strong>.</p>
    <textarea id="emailText" placeholder="Email body or subject"></textarea>
    <div>
      <button id="btnClassify">Classify</button>
      <button id="btnQuarantine">Show Quarantine</button>
    </div>
    <div id="result"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
